name: Mobile Preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'bizpulse-mobile/**'

jobs:
  preview:
    name: Expo Doctor & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bizpulse-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo doctor
        run: npx expo-doctor

      - name: TypeScript check
        run: npx tsc --noEmit
